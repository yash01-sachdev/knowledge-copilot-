name: Sync Hugging Face Space

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sync-hf-space.yml"
      - "apps/api/**"
      - "deploy/hf-space-api/**"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check required configuration
        run: |
          if [ -z "${{ secrets.HF_TOKEN }}" ]; then
            echo "Missing HF_TOKEN GitHub secret."
            exit 1
          fi
          if [ -z "${{ vars.HF_SPACE_REPO_ID }}" ]; then
            echo "Missing HF_SPACE_REPO_ID GitHub repository variable."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Prepare Space bundle
        run: |
          rm -rf .hf-space-build
          mkdir -p .hf-space-build
          cp deploy/hf-space-api/README.md .hf-space-build/README.md
          cp deploy/hf-space-api/Dockerfile .hf-space-build/Dockerfile
          cp deploy/hf-space-api/start.sh .hf-space-build/start.sh
          cp apps/api/requirements.txt .hf-space-build/requirements.txt
          cp -R apps/api/app .hf-space-build/app
          chmod +x .hf-space-build/start.sh

      - name: Push bundle to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO_ID: ${{ vars.HF_SPACE_REPO_ID }}
        run: |
          git clone https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO_ID} .hf-space-repo
          find .hf-space-repo -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          cp -R .hf-space-build/. .hf-space-repo/
          cd .hf-space-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Sync from GitHub ${GITHUB_SHA}"
            git push origin main
          else
            echo "No Space changes to push."
          fi
